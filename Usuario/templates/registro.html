{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro – SENA Centro Minero</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>

<body class="min-vh-100 d-flex align-items-center justify-content-end p-0 m-0"
      style="background: linear-gradient(rgba(0,0,0,0.50),rgba(0,0,0,0.70)),
             url('{% static 'img/fondo.png' %}') center/cover no-repeat fixed;">

  <!-- ── Panel lateral derecho ── -->
  <div class="d-flex flex-column justify-content-center px-5 py-5 min-vh-100"
       style="width:420px; background:rgba(255,255,255,0.12);
              backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
              border-left:1px solid rgba(255,255,255,0.22);
              border-radius:18px 0 0 18px;">

    <!-- Logo + título -->
    <div class="d-flex align-items-center gap-3 mb-4">
      <img src="{% static 'img/Logo-del-sena-Verde-150x150-removebg-preview.png' %}"
           alt="SENA" width="54"/>
      <div>
        <h1 class="fs-5 fw-bold text-white mb-0">Crear cuenta</h1>
        <small class="text-white-50">Centro Minero · Regional Boyacá</small>
      </div>
    </div>

    <!-- Pestañas -->
    <div class="d-flex gap-2 rounded-3 p-1 mb-4"
         style="background:rgba(0,0,0,0.25); border:1px solid rgba(255,255,255,0.12);">
      <button class="btn flex-fill rounded-2 py-2 border-0 fw-medium text-white bg-transparent"
              onclick="location.href='{% url 'login' %}'">
        Iniciar sesión
      </button>
      <button class="btn btn-success fw-bold flex-fill rounded-2 py-2 border-0">
        Registro
      </button>
    </div>

    <!-- Mensajes Django -->
    {% for message in messages %}
      <div class="alert {% if message.tags == 'success' %}alert-success{% else %}alert-danger{% endif %} py-2 small">
        {{ message }}
      </div>
    {% endfor %}

    <!-- Formulario → registro_view (POST) crea Usuario en BD -->
    <form method="POST" novalidate>
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label text-white-50 text-uppercase fw-semibold"
               style="font-size:.7rem; letter-spacing:.06em;">
          Nombre completo
        </label>
        <input type="text" name="username" class="form-control bg-white bg-opacity-10
               border-white border-opacity-25 text-white"
               placeholder="Ej. Juan Carlos Rodríguez"
               value="{{ username }}"/>
      </div>

      <div class="mb-3">
        <label class="form-label text-white-50 text-uppercase fw-semibold"
               style="font-size:.7rem; letter-spacing:.06em;">
          Correo electrónico
        </label>
        <input type="email" name="email" class="form-control bg-white bg-opacity-10
               border-white border-opacity-25 text-white"
               placeholder="correo@ejemplo.com"
               value="{{ email }}"/>
      </div>

      <div class="mb-3">
        <label class="form-label text-white-50 text-uppercase fw-semibold"
               style="font-size:.7rem; letter-spacing:.06em;">
          Número de documento
        </label>
        <input type="text" name="documento" class="form-control bg-white bg-opacity-10
               border-white border-opacity-25 text-white"
               placeholder="Cédula de ciudadanía"
               oninput="this.value=this.value.replace(/\D/g,'')"
               value="{{ documento }}"/>
      </div>

      <div class="row g-3 mb-3">
        <div class="col">
          <label class="form-label text-white-50 text-uppercase fw-semibold"
                 style="font-size:.7rem; letter-spacing:.06em;">
            Contraseña
          </label>
          <input type="password" name="password1" class="form-control bg-white bg-opacity-10
                 border-white border-opacity-25 text-white"
                 placeholder="••••••••" minlength="8"/>
        </div>
        <div class="col">
          <label class="form-label text-white-50 text-uppercase fw-semibold"
                 style="font-size:.7rem; letter-spacing:.06em;">
            Confirmar
          </label>
          <input type="password" name="password2" class="form-control bg-white bg-opacity-10
                 border-white border-opacity-25 text-white"
                 placeholder="••••••••"/>
        </div>
      </div>

      <button type="submit" class="btn btn-success w-100 fw-semibold py-2 mt-1">
        Registrarse →
      </button>
    </form>

    <hr class="border-white border-opacity-25 mt-4"/>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    window.addEventListener('pageshow', e => {
      if (e.persisted || performance.getEntriesByType('navigation')[0]?.type === 'back_forward')
        document.querySelectorAll('input').forEach(i => i.value = '');
    });
  </script>
</body>
</html>
